name: Capture daily ENS forecast

on:
  schedule:
    # 00z ENS products are on the open-data mirror by ~08:00 UTC; the second
    # run is a retry in case the first fires before publication or fails.
    - cron: "30 9 * * *"
    - cron: "30 21 * * *"
  workflow_dispatch:

concurrency:
  group: capture
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Capture available runs
        run: uv run python code/capture.py --backfill 3

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "no new data"
          else
            git commit -m "Capture $(date -u +%F) ENS point data"
            git push
          fi
